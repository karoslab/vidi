name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - name: Residue check
        working-directory: ${{ github.workspace }}
        run: |
          if grep -rIEnf scripts/residue-denylist.txt . --exclude-dir=.git --exclude=residue-denylist.txt; then
            echo "Personal/internal residue found (see matches above)"; exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
